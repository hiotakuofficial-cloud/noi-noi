<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hicine API Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        input, select, button {
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        input, select {
            flex: 1;
            min-width: 200px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            margin: 20px 0;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .card-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .card-meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .card-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tag {
            background: #667eea;
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8em;
        }

        .download-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
        }

        .download-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #764ba2;
        }

        .download-link {
            display: block;
            background: #f8f9fa;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            text-decoration: none;
            color: #333;
            transition: background 0.2s;
        }

        .download-link:hover {
            background: #667eea;
            color: white;
        }

        .quality-badge {
            background: #28a745;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.8em;
            margin-left: 5px;
        }

        .size-badge {
            background: #ffc107;
            color: #333;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.8em;
            margin-left: 5px;
        }

        .error {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: center;
        }

        .no-results {
            text-align: center;
            color: white;
            font-size: 1.5em;
            margin: 50px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Hicine API Test</h1>
        
        <div class="controls">
            <div class="input-group">
                <select id="action">
                    <option value="trending">Trending</option>
                    <option value="search">Search</option>
                    <option value="recent">Recent</option>
                    <option value="hollywood_movies">Hollywood Movies</option>
                    <option value="bollywood_movies">Bollywood Movies</option>
                    <option value="hollywood_series">Hollywood Series</option>
                    <option value="anime_list">Anime List</option>
                </select>
                
                <input type="text" id="searchQuery" placeholder="Search query (for search action)" style="display:none;">
                
                <input type="number" id="limit" placeholder="Limit (default: 10)" value="10" min="1" max="50">
                
                <button onclick="fetchData()">🔍 Fetch Data</button>
            </div>
        </div>

        <div id="loading" class="loading" style="display:none;">
            ⏳ Loading...
        </div>

        <div id="error" class="error" style="display:none;"></div>

        <div id="results" class="results"></div>
    </div>

    <script>
        const API_URL = 'https://www.hiotaku.in/hicine.php';
        const API_TOKEN = 'afaea552101228848de8f8c7f48a1b7d7a6a042a6094274eaa9d30cb64bf91a7';

        // Show/hide search input based on action
        document.getElementById('action').addEventListener('change', function() {
            const searchInput = document.getElementById('searchQuery');
            searchInput.style.display = this.value === 'search' ? 'block' : 'none';
        });

        async function fetchData() {
            const action = document.getElementById('action').value;
            const query = document.getElementById('searchQuery').value;
            const limit = document.getElementById('limit').value || 10;

            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const results = document.getElementById('results');

            // Clear previous results
            results.innerHTML = '';
            error.style.display = 'none';
            loading.style.display = 'block';

            try {
                let url = `${API_URL}?action=${action}&token=${API_TOKEN}&limit=${limit}`;
                
                if (action === 'search') {
                    if (!query) {
                        throw new Error('Please enter a search query');
                    }
                    // Use encodeURIComponent for proper URL encoding
                    url += `&q=${encodeURIComponent(query)}`;
                }

                const response = await fetch(url);
                const data = await response.json();

                loading.style.display = 'none';

                if (data.error) {
                    throw new Error(data.error);
                }

                displayResults(data);

            } catch (err) {
                loading.style.display = 'none';
                error.textContent = '❌ Error: ' + err.message;
                error.style.display = 'block';
            }
        }

        function displayResults(data) {
            const results = document.getElementById('results');
            
            // Handle both array and object with data property
            const items = Array.isArray(data) ? data : (data.data || []);

            if (items.length === 0) {
                results.innerHTML = '<div class="no-results">No results found</div>';
                return;
            }

            items.forEach(item => {
                const card = createCard(item);
                results.appendChild(card);
            });
        }

        function createCard(item) {
            const card = document.createElement('div');
            card.className = 'card';

            const image = document.createElement('img');
            image.className = 'card-image';
            image.src = item.featured_image || 'https://via.placeholder.com/300x400?text=No+Image';
            image.alt = item.title;
            image.onerror = function() {
                this.src = 'https://via.placeholder.com/300x400?text=No+Image';
            };

            const content = document.createElement('div');
            content.className = 'card-content';

            const title = document.createElement('div');
            title.className = 'card-title';
            title.textContent = item.title;

            const meta = document.createElement('div');
            meta.className = 'card-meta';
            meta.textContent = `Type: ${item.contentType || 'Unknown'} | ID: ${item._id}`;

            const categories = document.createElement('div');
            categories.className = 'card-categories';
            if (item.categories) {
                item.categories.split(',').slice(0, 5).forEach(cat => {
                    const tag = document.createElement('span');
                    tag.className = 'tag';
                    tag.textContent = cat.trim();
                    categories.appendChild(tag);
                });
            }

            content.appendChild(title);
            content.appendChild(meta);
            content.appendChild(categories);

            // Add download links
            if (item.links) {
                const downloadSection = createDownloadSection(item.links);
                content.appendChild(downloadSection);
            }

            // Add season info for series
            if (item.season_1 || item.season_2 || item.season_3) {
                const seasonInfo = document.createElement('div');
                seasonInfo.className = 'download-section';
                seasonInfo.innerHTML = '<div class="download-title">📺 Seasons Available</div>';
                
                for (let i = 1; i <= 10; i++) {
                    if (item[`season_${i}`]) {
                        const seasonTag = document.createElement('span');
                        seasonTag.className = 'tag';
                        seasonTag.textContent = `Season ${i}`;
                        seasonInfo.appendChild(seasonTag);
                    }
                }
                content.appendChild(seasonInfo);
            }

            card.appendChild(image);
            card.appendChild(content);

            return card;
        }

        function createDownloadSection(linksString) {
            const section = document.createElement('div');
            section.className = 'download-section';

            const title = document.createElement('div');
            title.className = 'download-title';
            title.textContent = '⬇️ Download Links';
            section.appendChild(title);

            // Parse links (format: url, Link2, Link3, ..., Title, Size)
            const links = linksString.split('\n').filter(l => l.trim());

            links.forEach(linkLine => {
                const parts = linkLine.split(',').map(p => p.trim());
                if (parts.length > 0 && parts[0].startsWith('http')) {
                    const link = document.createElement('a');
                    link.className = 'download-link';
                    link.href = parts[0];
                    link.target = '_blank';
                    
                    // Extract quality and size from the line
                    const quality = linkLine.match(/(\d+p)/i)?.[1] || '';
                    const size = linkLine.match(/(\d+(?:\.\d+)?\s*(?:MB|GB))/i)?.[1] || '';
                    
                    link.innerHTML = `
                        📥 Download
                        ${quality ? `<span class="quality-badge">${quality}</span>` : ''}
                        ${size ? `<span class="size-badge">${size}</span>` : ''}
                    `;
                    
                    section.appendChild(link);
                }
            });

            return section;
        }

        // Load trending on page load
        window.onload = () => fetchData();
    </script>
</body>
</html>
